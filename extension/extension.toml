id = "excalidraw-preview"
name = "Excalidraw Preview"
version = "0.1.0"
schema_version = 1
authors = ["Arindam Pradhan"]
description = "Preview .excalidraw files in a native window"
repository = "https://github.com/arindampradhan/excalidraw-zed-extension"

[language_servers.excalidraw-preview]
name = "Excalidraw Preview"
language = "Excalidraw"
languages = []

[[capabilities]]
kind = "process:exec"
command = "excalidraw-preview"
args = ["*"]

[slash_commands.preview-excalidraw]
description = "Open live preview for the active .excalidraw file"
requires_argument = false